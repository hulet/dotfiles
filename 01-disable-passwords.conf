# ==============================================================================
# INSTALLATION INSTRUCTIONS:
# 1. Save this file as: /etc/ssh/sshd_config.d/01-disable-passwords.conf
# 2. Set ownership:     sudo chown root:root /etc/ssh/sshd_config.d/01-disable-passwords.conf
# 3. Set permissions:   sudo chmod 644 /etc/ssh/sshd_config.d/01-disable-passwords.conf
# 4. Test syntax:       sudo sshd -t
# 5. Restart SSH:       sudo systemctl restart sshd
#
# WARNING: Ensure your SSH Key is working before applying, or you will be locked out!
# ==============================================================================

# Disable all password-based and interactive authentication
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
